name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: master
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v6

      - uses: haskell-actions/setup@v2
        id: setup
        with:
          ghc-version: '9.10'
          cabal-version: '3.12'

      - name: Configure
        run: |
          cabal update
          cabal configure --enable-tests

      - name: Cache
        uses: actions/cache@v5
        with:
          path: |
            ${{ steps.setup.outputs.cabal-store }}
            dist-newstyle
          key: ${{ runner.os }}-ghc-${{ steps.setup.outputs.ghc-version }}-${{ hashFiles('**/*.cabal', 'cabal.project') }}
          restore-keys: |
            ${{ runner.os }}-ghc-${{ steps.setup.outputs.ghc-version }}-

      - name: Build
        run: cabal build all

      - name: Test
        env:
          ARBITER_TEST_CONN_STRING: "host=localhost port=5432 user=postgres password=master dbname=postgres"
        run: cabal test all
