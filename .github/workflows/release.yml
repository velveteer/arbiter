name: Release to Hackage

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: master
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v6

      - uses: haskell-actions/setup@v2
        id: setup
        with:
          ghc-version: '9.10'
          cabal-version: '3.12'

      - name: Configure
        run: |
          cabal update
          cabal configure --enable-tests

      - name: Cache
        uses: actions/cache@v5
        with:
          path: |
            ${{ steps.setup.outputs.cabal-store }}
            dist-newstyle
          key: ${{ runner.os }}-ghc-${{ steps.setup.outputs.ghc-version }}-${{ hashFiles('**/*.cabal', 'cabal.project') }}
          restore-keys: |
            ${{ runner.os }}-ghc-${{ steps.setup.outputs.ghc-version }}-

      - name: Build
        run: cabal build all

      - name: Test
        env:
          ARBITER_TEST_CONN_STRING: "host=localhost port=5432 user=postgres password=master dbname=postgres"
        run: cabal test all

      - name: Package
        run: |
          for pkg in arbiter-core arbiter-migrations arbiter-worker arbiter-simple arbiter-hasql arbiter-orville arbiter-servant arbiter-servant-ui; do
            cabal sdist $pkg
          done

      - name: Upload to Hackage
        env:
          HACKAGE_USERNAME: ${{ secrets.HACKAGE_USERNAME }}
          HACKAGE_PASSWORD: ${{ secrets.HACKAGE_PASSWORD }}
        run: |
          for tarball in dist-newstyle/sdist/*.tar.gz; do
            cabal upload --publish --username="$HACKAGE_USERNAME" --password="$HACKAGE_PASSWORD" "$tarball"
          done
