services:

  db:
    image: ${POSTGRES_IMAGE:-postgres:17.4}
    healthcheck:
      test: ["CMD", "pg_isready", "-q"]
      interval: 10s
    environment:
      POSTGRES_PASSWORD: master
    ports:
      - 54324:5432
    command: postgres -c logging_collector=on -c log_destination=stderr -c log_statement=all
    stop_grace_period: 1s
